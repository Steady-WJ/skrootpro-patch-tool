name: SKRoot Pro Cross-Compile

on: [push, workflow_dispatch]

jobs:
  build-x86:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake make g++ libcapstone-dev
      - name: Build for x86_64
        run: |
          cd patch_kernel_sk
          make -j$(nproc)
      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch_kernel_sk-x86_64
          path: patch_kernel_sk/patch_kernel_sk

  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          sudo apt-get install -y cmake make
      - name: Build for ARM64
        run: |
          cd patch_kernel_sk
          make clean
          make CXX=aarch64-linux-gnu-g++ CC=aarch64-linux-gnu-gcc -j$(nproc)
      - name: Verify ARM64 binary
        run: file patch_kernel_sk/patch_kernel_sk
      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch_kernel_sk-arm64
          path: patch_kernel_sk/patch_kernel_sk
