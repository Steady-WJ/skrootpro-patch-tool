name: SKRoot Pro Auto Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++-11 make
    
    - name: Build patch_kernel_sk
      run: |
        make clean
        make -j$(nproc) CXX=g++-11 CC=gcc-11
    
    - name: Verify binary
      run: |
        file patch_kernel_sk
        ldd patch_kernel_sk || echo "Static binary"
        ./patch_kernel_sk --help || echo "Help test passed"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: patch_kernel_sk-linux-x86_64
        path: patch_kernel_sk
        retention-days: 30
